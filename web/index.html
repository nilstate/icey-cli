<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>icey</title>
  <link rel="stylesheet" href="/src/style.css">
  <script>
    // Apply rail preference before first paint to avoid layout flicker.
    try {
      var pref = sessionStorage.getItem('icey:rail')
      document.documentElement.setAttribute('data-rail', pref === 'closed' ? 'closed' : 'open')
    } catch (e) {
      document.documentElement.setAttribute('data-rail', 'open')
    }
  </script>
</head>
<body>
  <main id="stage" class="stage" data-empty="true">
    <video id="remote-video" class="stage__video" autoplay playsinline muted></video>
    <canvas id="vision-overlay" class="stage__canvas" aria-hidden="true"></canvas>

    <div id="live-bar" class="live-bar" aria-hidden="true"></div>

    <div id="player-overlay" class="stage__empty">
      <div class="stage__empty-inner">
        <span class="stage__empty-eyebrow">icey</span>
        <p class="stage__empty-line">Pick a peer in the side panel to begin.</p>
      </div>
    </div>

    <div class="hud hud--top hud--left">
      <div class="source-pill" id="source-pill">
        <span id="source-label" class="source-pill__label">—</span>
      </div>
    </div>

    <div class="hud hud--top hud--right">
      <div id="metric-strip" class="metric-strip">
        <div id="metric-latency" class="metric-cell metric-cell--latency" title="average time each frame spends in the browser's jitter buffer (post-network, pre-display). Subset of end-to-end latency; not glass-to-glass.">
          <span class="metric-cell__label">buffer</span>
          <span class="metric-cell__row">
            <canvas id="latency-spark" class="metric-cell__spark" width="64" height="14" aria-hidden="true"></canvas>
            <span id="latency-value" class="metric-cell__value">—</span>
            <span class="metric-cell__unit">ms</span>
          </span>
        </div>
        <div class="metric-cell" title="received frames per second">
          <span class="metric-cell__label">fps</span>
          <span class="metric-cell__row">
            <span id="fps-value" class="metric-cell__value">—</span>
          </span>
        </div>
        <div class="metric-cell" title="decoder + resolution">
          <span class="metric-cell__label">codec</span>
          <span class="metric-cell__row">
            <span id="codec-value" class="metric-cell__value">—</span>
          </span>
        </div>
        <div class="metric-cell" title="incoming bitrate">
          <span class="metric-cell__label">bitrate</span>
          <span class="metric-cell__row">
            <span id="bitrate-value" class="metric-cell__value">—</span>
          </span>
        </div>
      </div>
    </div>

    <div class="hud hud--bottom hud--left">
      <div id="voice" class="voice" data-active="false">
        <div class="voice__ring" aria-hidden="true">
          <div class="voice__ring-pulse"></div>
          <span class="voice__icon">●</span>
        </div>
        <div class="voice__meter" aria-hidden="true">
          <div id="voice-bar" class="voice__bar"></div>
          <div id="voice-peak" class="voice__peak"></div>
        </div>
      </div>
    </div>

    <div class="hud hud--bottom hud--center">
      <div id="controls" class="controls is-hidden">
        <button id="btn-mute" class="btn-ctl" data-muted="true" title="Speaker · click to unmute (M). Default muted on a single-Mac demo to avoid mic→speaker echo.">
          <span class="btn-ctl__glyph">🔇</span>
        </button>
        <button id="btn-camera" class="btn-ctl" data-muted="false" title="Toggle camera (V)">
          <span class="btn-ctl__glyph">📹</span>
        </button>
        <button id="btn-snapshot" class="btn-ctl" title="Snapshot · capture the current frame as PNG (S)">
          <span class="btn-ctl__glyph">📸</span>
        </button>
        <button id="btn-fullscreen" class="btn-ctl" title="Fullscreen (F)">
          <span class="btn-ctl__glyph">⛶</span>
        </button>
        <button id="btn-hangup" class="btn-ctl btn-ctl--danger" title="Hangup">
          <span class="btn-ctl__glyph">⏻</span>
        </button>
      </div>
    </div>

    <div id="local-preview" class="local-preview is-hidden">
      <video id="local-video" autoplay playsinline muted></video>
    </div>

    <canvas id="waveform" class="waveform" aria-hidden="true"></canvas>
    <div id="snapshot-flash" class="snapshot-flash" aria-hidden="true"></div>
  </main>

  <aside id="rail" class="rail">
    <button id="rail-toggle" class="rail-toggle" type="button" aria-label="Collapse panel" title="Collapse panel (E)">
      <span class="rail-toggle__glyph">›</span>
    </button>

    <div class="rail__inner">
      <header class="rail__brand">
        <div class="rail__brand-row">
          <span class="rail__wordmark">icey</span>
          <span id="rail-version" class="rail__version">—</span>
        </div>
        <div id="status" class="status status--offline" aria-live="polite">offline</div>
      </header>

      <section class="rail__section">
        <div class="rail__sec-head">
          <h2>Source</h2>
        </div>
        <div id="rail-source" class="rail__source">—</div>
      </section>

      <section class="rail__section">
        <div class="rail__sec-head">
          <h2>Peers</h2>
          <span id="peer-count" class="rail__hint">0</span>
        </div>
        <ul id="peer-list" class="peer-list">
          <li class="peer-empty">No peers online</li>
        </ul>
      </section>

      <section class="rail__section rail__section--scroll">
        <div class="rail__sec-head">
          <h2>Events</h2>
          <span id="event-status" class="rail__hint">waiting</span>
        </div>
        <ul id="event-list" class="event-list">
          <li class="event-empty">No events yet</li>
        </ul>
      </section>

      <section class="rail__section">
        <div class="rail__sec-head">
          <h2>Pipeline</h2>
        </div>
        <dl id="intelligence-stats" class="stats">
          <div><dt>source fps</dt><dd id="intelligence-source-fps">—</dd></div>
          <div><dt>sampled fps</dt><dd id="intelligence-sampled-fps">—</dd></div>
          <div><dt>vision queue</dt><dd id="intelligence-vision-queue">—</dd></div>
          <div><dt>dropped</dt><dd id="intelligence-vision-dropped">—</dd></div>
          <div><dt>vision latency</dt><dd id="intelligence-latency">—</dd></div>
          <div><dt>artifacts</dt><dd id="intelligence-artifacts">—</dd></div>
        </dl>
      </section>

      <footer class="rail__footer">
        <span id="connection-info" class="rail__conn">—</span>
      </footer>
    </div>
  </aside>

  <script type="module" src="/src/app.js"></script>
</body>
</html>
